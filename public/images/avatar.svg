<svg viewBox="0 0 400 420" xmlns="http://www.w3.org/2000/svg">
<style>
  /* ── DARK MODE (default) ── */
  .bg-circle   { fill: url(#bgD); }
  .bg-ring     { stroke: #6c5ce7; stroke-opacity: 0.55; }
  .bg-ring2    { stroke: #a29bfe; stroke-opacity: 0.18; }
  .bg-wing     { fill: #0d0b2e; }
  .suit-body   { fill: url(#suitD); }
  .suit-shadow { fill: #120f38; }
  .lapel-l     { fill: url(#lapelD); }
  .lapel-r     { fill: url(#lapelD); }
  .shirt       { fill: #c4b8ff; fill-opacity: 0.22; }
  .tie         { fill: #6c5ce7; }
  .tie-knot    { fill: #5046c0; }
  .tie-shine   { fill: #8070f0; }
  .skin        { fill: url(#skinD); }
  .skin-ear    { fill: #d49448; }
  .hair        { fill: #1a1848; }
  .hair-shine  { fill: #2e2870; }
  .badge-bg-1  { fill: #6c5ce7; fill-opacity: 0.18; stroke: #6c5ce7; stroke-opacity: 0.85; }
  .badge-bg-2  { fill: #00cec9; fill-opacity: 0.15; stroke: #00cec9; stroke-opacity: 0.8; }
  .badge-bg-3  { fill: #fd79a8; fill-opacity: 0.13; stroke: #fd79a8; stroke-opacity: 0.75; }
  .badge-bg-4  { fill: #fdcb6e; fill-opacity: 0.12; stroke: #fdcb6e; stroke-opacity: 0.7; }
  .badge-txt-1 { fill: #a29bfe; }
  .badge-txt-2 { fill: #00cec9; }
  .badge-txt-3 { fill: #fd79a8; }
  .badge-txt-4 { fill: #fdcb6e; }
  .dot-1 { fill: #6c5ce7; }
  .dot-2 { fill: #00cec9; }
  .dot-3 { fill: #fd79a8; }
  .dot-4 { fill: #a29bfe; }
  .star-1 { fill: #6c5ce7; }
  .star-2 { fill: #00cec9; }
  .star-3 { fill: #fd79a8; }

  /* ── LIGHT MODE ── */
  @media (prefers-color-scheme: light) {
    .bg-circle   { fill: url(#bgL); }
    .bg-ring     { stroke: #6c5ce7; stroke-opacity: 0.7; }
    .bg-ring2    { stroke: #6c5ce7; stroke-opacity: 0.25; }
    .bg-wing     { fill: #c4b8f8; }
    .suit-body   { fill: url(#suitL); }
    .suit-shadow { fill: #2a246a; }
    .lapel-l     { fill: url(#lapelL); }
    .lapel-r     { fill: url(#lapelL); }
    .shirt       { fill: #ede8ff; fill-opacity: 0.7; }
    .tie         { fill: #6c5ce7; }
    .tie-knot    { fill: #5046c0; }
    .tie-shine   { fill: #8878f8; }
    .skin        { fill: url(#skinL); }
    .skin-ear    { fill: #e09850; }
    .hair        { fill: #2a2060; }
    .hair-shine  { fill: #3a2e80; }
    .badge-bg-1  { fill: #6c5ce7; fill-opacity: 0.12; stroke: #6c5ce7; stroke-opacity: 1; }
    .badge-bg-2  { fill: #00cec9; fill-opacity: 0.1;  stroke: #00cec9; stroke-opacity: 1; }
    .badge-bg-3  { fill: #fd79a8; fill-opacity: 0.1;  stroke: #fd79a8; stroke-opacity: 1; }
    .badge-bg-4  { fill: #f0a000; fill-opacity: 0.1;  stroke: #d48800; stroke-opacity: 1; }
    .badge-txt-1 { fill: #5040c0; }
    .badge-txt-2 { fill: #008888; }
    .badge-txt-3 { fill: #c04070; }
    .badge-txt-4 { fill: #b06000; }
    .dot-1 { fill: #6c5ce7; }
    .dot-2 { fill: #009999; }
    .dot-3 { fill: #d04070; }
    .dot-4 { fill: #7060d0; }
    .star-1 { fill: #6c5ce7; }
    .star-2 { fill: #009999; }
    .star-3 { fill: #d04070; }
  }
</style>
<defs>
  <!-- Dark bg gradient -->
  <radialGradient id="bgD" cx="50%" cy="38%" r="65%">
    <stop offset="0%" stop-color="#3a3090"/>
    <stop offset="60%" stop-color="#201c60"/>
    <stop offset="100%" stop-color="#110e3a"/>
  </radialGradient>
  <!-- Light bg gradient -->
  <radialGradient id="bgL" cx="50%" cy="38%" r="65%">
    <stop offset="0%" stop-color="#d8d0ff"/>
    <stop offset="60%" stop-color="#b8aff5"/>
    <stop offset="100%" stop-color="#9b8fe8"/>
  </radialGradient>
  <!-- Skin dark -->
  <linearGradient id="skinD" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#f8cc8a"/>
    <stop offset="100%" stop-color="#e0a050"/>
  </linearGradient>
  <!-- Skin light -->
  <linearGradient id="skinL" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#fad898"/>
    <stop offset="100%" stop-color="#eab060"/>
  </linearGradient>
  <!-- Suit dark -->
  <linearGradient id="suitD" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#252060"/>
    <stop offset="50%" stop-color="#1e1858"/>
    <stop offset="100%" stop-color="#141040"/>
  </linearGradient>
  <!-- Suit light -->
  <linearGradient id="suitL" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#2e2870"/>
    <stop offset="50%" stop-color="#252060"/>
    <stop offset="100%" stop-color="#1a1850"/>
  </linearGradient>
  <!-- Lapel dark -->
  <linearGradient id="lapelD" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#1a1650" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#0d0b30" stop-opacity="0.6"/>
  </linearGradient>
  <!-- Lapel light -->
  <linearGradient id="lapelL" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#1e1a58" stop-opacity="0.85"/>
    <stop offset="100%" stop-color="#110e40" stop-opacity="0.6"/>
  </linearGradient>

  <clipPath id="avClip"><circle cx="200" cy="210" r="196"/></clipPath>
  <filter id="avBadge" x="-25%" y="-25%" width="150%" height="150%">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="avGlow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- ── OUTER RINGS ── -->
<circle cx="200" cy="210" r="200" class="bg-ring2" stroke-width="1" fill="none"/>
<circle cx="200" cy="210" r="196" class="bg-ring" stroke-width="3" fill="none"/>

<!-- ── BACKGROUND CIRCLE ── -->
<circle cx="200" cy="210" r="194" class="bg-circle"/>

<g clip-path="url(#avClip)">

  <!-- Background depth wings (like the reference illustration) -->
  <path d="M200,210 Q55,55 10,170 Q-10,260 40,360 Q80,420 200,420 Z"
        class="bg-wing" opacity="0.62"/>
  <path d="M200,210 Q345,55 390,170 Q410,260 360,360 Q320,420 200,420 Z"
        class="bg-wing" opacity="0.62"/>

  <!-- ── BODY / SUIT ── -->
  <!-- Main suit block -->
  <path d="M30,420 Q40,305 110,272 L162,252 L200,285 L238,252 L290,272 Q360,305 370,420 Z"
        class="suit-body"/>

  <!-- Suit collar shadow depth -->
  <path d="M30,420 Q40,305 110,272 L162,252 L200,285 L238,252 L290,272 Q360,305 370,420 Z"
        class="suit-shadow" opacity="0.18"/>

  <!-- Left shoulder shading -->
  <path d="M30,420 Q40,305 110,272 L145,258 Q120,280 110,320 Q80,370 55,420 Z"
        class="suit-shadow" opacity="0.35"/>
  <!-- Right shoulder shading -->
  <path d="M370,420 Q360,305 290,272 L255,258 Q280,280 290,320 Q320,370 345,420 Z"
        class="suit-shadow" opacity="0.35"/>

  <!-- Left lapel -->
  <path d="M200,285 L162,252 Q150,268 153,286 Q168,298 190,304 Z" class="lapel-l"/>
  <!-- Right lapel -->
  <path d="M200,285 L238,252 Q250,268 247,286 Q232,298 210,304 Z" class="lapel-r"/>

  <!-- Shirt / inner showing at V -->
  <path d="M190,304 Q200,316 210,304 L215,370 Q200,380 185,370 Z" class="shirt"/>

  <!-- Tie -->
  <path d="M194,298 L206,298 L212,358 L200,372 L188,358 Z" class="tie"/>
  <!-- Tie knot (triangle) -->
  <path d="M192,292 L208,292 L200,302 Z" class="tie-knot"/>
  <!-- Tie highlight stripe -->
  <path d="M198,302 L202,302 L205,335 L200,340 L195,335 Z" class="tie-shine" opacity="0.45"/>
  <!-- Tie bottom point accent -->
  <path d="M200,365 L196,358 L204,358 Z" class="tie-shine" opacity="0.5"/>

  <!-- ── NECK ── -->
  <rect x="182" y="228" width="36" height="44" rx="16" class="skin"/>

  <!-- ── HEAD ── -->
  <!-- Head glow (subtle) -->
  <ellipse cx="200" cy="182" rx="72" ry="74" class="dot-1" opacity="0.06" filter="url(#avGlow)"/>
  <!-- Head -->
  <ellipse cx="200" cy="178" rx="70" ry="72" class="skin"/>
  <!-- Face highlight (top of forehead) -->
  <ellipse cx="192" cy="152" rx="28" ry="18" fill="white" opacity="0.07"/>

  <!-- ── HAIR ── -->
  <!-- Main hair -->
  <path d="M130,178 Q132,104 200,100 Q268,104 270,178
           Q254,142 200,142 Q146,142 130,178 Z" class="hair"/>
  <!-- Left side hair -->
  <path d="M130,178 Q125,158 130,145 Q134,130 142,138 Q130,158 130,178 Z" class="hair"/>
  <!-- Right side hair -->
  <path d="M270,178 Q275,158 270,145 Q266,130 258,138 Q270,158 270,178 Z" class="hair"/>
  <!-- Hair shine -->
  <path d="M160,118 Q185,104 222,108 Q200,102 178,110 Z" class="hair-shine" opacity="0.7"/>
  <!-- Hair parting detail -->
  <path d="M200,100 Q205,112 204,130" stroke="#2a2470" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- ── EARS ── -->
  <!-- Left ear -->
  <ellipse cx="130" cy="188" rx="11" ry="16" class="skin"/>
  <ellipse cx="130" cy="188" rx="6" ry="10" class="skin-ear" opacity="0.55"/>
  <!-- Right ear -->
  <ellipse cx="270" cy="188" rx="11" ry="16" class="skin"/>
  <ellipse cx="270" cy="188" rx="6" ry="10" class="skin-ear" opacity="0.55"/>

</g><!-- end clip -->

<!-- ── FLOATING TECH BADGES ── -->
<!-- </> -->
<g transform="translate(14,52)" filter="url(#avBadge)">
  <rect width="68" height="34" rx="10" class="badge-bg-1" stroke-width="1.8"/>
  <text x="9" y="24" font-family="JetBrains Mono, monospace" font-size="15"
        class="badge-txt-1" font-weight="700">&lt;/&gt;</text>
</g>
<!-- { } -->
<g transform="translate(300,44)" filter="url(#avBadge)">
  <rect width="68" height="34" rx="10" class="badge-bg-2" stroke-width="1.8"/>
  <text x="10" y="24" font-family="JetBrains Mono, monospace" font-size="14"
        class="badge-txt-2" font-weight="700">{ }</text>
</g>
<!-- () -->
<g transform="translate(10,210)" filter="url(#avBadge)">
  <rect width="58" height="34" rx="10" class="badge-bg-3" stroke-width="1.8"/>
  <text x="10" y="24" font-family="JetBrains Mono, monospace" font-size="14"
        class="badge-txt-3" font-weight="700">()</text>
</g>
<!-- .py -->
<g transform="translate(332,195)" filter="url(#avBadge)">
  <rect width="56" height="34" rx="10" class="badge-bg-4" stroke-width="1.8"/>
  <text x="7" y="24" font-family="JetBrains Mono, monospace" font-size="14"
        class="badge-txt-4" font-weight="700">.py</text>
</g>
<!-- git ✓ -->
<g transform="translate(150,22)" filter="url(#avBadge)">
  <rect width="80" height="32" rx="10" class="badge-bg-1" stroke-width="1.8"/>
  <text x="10" y="22" font-family="JetBrains Mono, monospace" font-size="13"
        class="badge-txt-1" font-weight="700">git ✓</text>
</g>

<!-- ── PULSING DOTS ── -->
<circle cx="44" cy="155" r="4" class="dot-1" opacity="0.7">
  <animate attributeName="r" values="4;7;4" dur="2.4s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.7;1;0.7" dur="2.4s" repeatCount="indefinite"/>
</circle>
<circle cx="356" cy="148" r="3.5" class="dot-2" opacity="0.65">
  <animate attributeName="r" values="3.5;6;3.5" dur="2s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.65;1;0.65" dur="2s" repeatCount="indefinite"/>
</circle>
<circle cx="200" cy="18" r="3.5" class="dot-3" opacity="0.6">
  <animate attributeName="r" values="3.5;6;3.5" dur="2.8s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite"/>
</circle>
<circle cx="28" cy="350" r="3" class="dot-4" opacity="0.6">
  <animate attributeName="r" values="3;5;3" dur="3.2s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.5;0.9;0.5" dur="3.2s" repeatCount="indefinite"/>
</circle>
<circle cx="375" cy="355" r="3" class="dot-1" opacity="0.55">
  <animate attributeName="r" values="3;5;3" dur="2.6s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.6s" repeatCount="indefinite"/>
</circle>

<!-- ── SPARKLE STARS ── -->
<polygon points="352,76 354,69 356,76 363,78 356,80 354,87 352,80 345,78"
         class="star-1" opacity="0.6">
  <animate attributeName="opacity" values="0.6;0.08;0.6" dur="3.4s" repeatCount="indefinite"/>
</polygon>
<polygon points="34,305 36,298 38,305 45,307 38,309 36,316 34,309 27,307"
         class="star-2" opacity="0.55">
  <animate attributeName="opacity" values="0.55;0.05;0.55" dur="4.2s" repeatCount="indefinite"/>
</polygon>
<polygon points="366,300 368,294 370,300 377,302 370,304 368,310 366,304 359,302"
         class="star-3" opacity="0.5">
  <animate attributeName="opacity" values="0.5;0.05;0.5" dur="2.9s" repeatCount="indefinite"/>
</polygon>
</svg>
